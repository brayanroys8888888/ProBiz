<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchBiz ⌚</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text y='72' x='50' text-anchor='middle' font-size='60'>⌚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
  input[type="text"], 
  input[type="password"], 
  input[type="email"], 
  input[type="number"], 
  textarea, 
  select {
    font-size: 16px !important;
  }
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#20202a;--bg5:#2a2a36;
  --accent:#c9a84c;--accent2:#e8c97a;
  --text:#f0ede6;--text2:#a0a09a;--text3:#65635e;
  --success:#3dba74;--danger:#e05252;--info:#5b8dee;--warn:#e8a84c;
  --border:rgba(201,168,76,0.12);--border2:rgba(201,168,76,0.28);
  --r:10px;--r-sm:7px;--r-lg:14px;
  --sw:220px;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;overflow-x:hidden}
input,select{font-family:'Sora',sans-serif;font-size:13px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:var(--r-sm);padding:9px 12px;width:100%;outline:none;transition:border .18s,box-shadow .18s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
select option{background:var(--bg3)}
button{font-family:'Sora',sans-serif;cursor:pointer;border:none;outline:none;transition:all .15s}

/* SHELL */
.shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50}
.sb-logo{padding:20px 18px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:rgba(201,168,76,.15);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-text{font-family:'DM Mono',monospace;font-size:17px;color:var(--accent2);line-height:1.1}
.sb-logo-sub{font-size:10px;color:var(--text3);font-family:'Sora',sans-serif;font-weight:400}
.sb-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;background:none;border:none;width:100%;text-align:left}
.sb-item i{font-size:18px;flex-shrink:0;line-height:1}
.sb-item:hover{background:var(--bg3);color:var(--text2)}
.sb-item.active{background:rgba(201,168,76,.12);color:var(--accent2)}
.sb-footer{padding:12px 10px;border-top:0.5px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px}
.user-init{width:30px;height:30px;border-radius:50%;background:rgba(201,168,76,.18);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent2);flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-status{font-size:10px;color:var(--text3)}
.logout-btn{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:28px;height:28px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.logout-btn:hover{color:var(--danger);border-color:rgba(224,82,82,.3)}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.page-title{font-size:16px;font-weight:600}
.sync-chip{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px}
.sync-on{color:var(--success);background:rgba(61,186,116,.1)}
.sync-off{color:var(--warn);background:rgba(232,168,76,.1)}

/* NET BAR */
.net-bar{padding:7px 28px;display:flex;align-items:center;gap:8px;font-size:12px;border-bottom:0.5px solid}
.net-bar.offline{background:rgba(232,168,76,.08);border-color:rgba(232,168,76,.2);color:var(--warn)}
.net-bar.online{background:rgba(61,186,116,.08);border-color:rgba(61,186,116,.2);color:var(--success)}

/* CONTENT */
.content{flex:1;padding:28px;overflow-y:auto}

/* BOTTOM NAV */
.bnav{display:none;background:var(--bg2);border-top:0.5px solid var(--border);padding:4px 0;position:fixed;bottom:0;left:0;right:0;z-index:50}
.bnav-row{display:flex}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;font-family:'Sora',sans-serif}
.bnav-btn i{font-size:22px;line-height:1;display:block}
.bnav-btn.active{color:var(--accent2)}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.1px;font-weight:500}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;position:relative;overflow:hidden}
.stat-top{height:2px;position:absolute;top:0;left:0;right:0}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-label i{font-size:14px}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1.1;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text3)}
.c-gold .stat-top{background:var(--accent)}.c-gold .stat-val{color:var(--accent2)}
.c-green .stat-top{background:var(--success)}.c-green .stat-val{color:var(--success)}
.c-red .stat-top{background:var(--danger)}.c-red .stat-val{color:var(--danger)}
.c-blue .stat-top{background:var(--info)}.c-blue .stat-val{color:var(--info)}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#0a0a0f}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border2)}.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-danger-soft{background:rgba(224,82,82,.1);color:var(--danger);border:0.5px solid rgba(224,82,82,.25)}.btn-danger-soft:hover{background:rgba(224,82,82,.18)}
.btn-google{background:#fff;color:#222;width:100%;justify-content:center;margin-top:10px;padding:8px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;cursor:pointer;border:0.5px solid #ddd}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center}

/* LIST */
.list-item{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.list-item:last-child{margin-bottom:0}
.item-main{flex:1;min-width:0}
.item-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--text3);margin-top:3px}
.item-right{text-align:right;flex-shrink:0}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-ok{background:rgba(61,186,116,.1);color:var(--success);border:0.5px solid rgba(61,186,116,.25)}
.badge-ko{background:rgba(224,82,82,.1);color:var(--danger);border:0.5px solid rgba(224,82,82,.25)}
.badge-warn{background:rgba(232,168,76,.1);color:var(--warn);border:0.5px solid rgba(232,168,76,.25)}
.badge-info{background:rgba(91,141,238,.1);color:var(--info);border:0.5px solid rgba(91,141,238,.25)}

/* FORM */
.fg{margin-bottom:14px}
.fg label{font-size:11px;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.preview-box{background:rgba(201,168,76,.06);border:0.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;font-size:12px;display:none;line-height:1.6}

/* PERIOD TABS */
.ptabs{display:flex;background:var(--bg3);border-radius:var(--r-sm);padding:3px;margin-bottom:18px;gap:2px}
.ptab{flex:1;padding:7px 4px;background:none;color:var(--text3);font-size:12px;border-radius:6px;font-weight:500;font-family:'Sora',sans-serif;cursor:pointer;border:none}
.ptab.active{background:var(--accent);color:#0a0a0f}

/* PROGRESS */
.pbar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:3px;transition:width .4s}

/* ALERT */
.alert{background:rgba(224,82,82,.08);border:0.5px solid rgba(224,82,82,.2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--danger)}

/* SECTION HDR */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:18px;font-weight:600}

/* DIVIDER */
.div-or{display:flex;align-items:center;gap:10px;margin:14px 0}
.div-or::before,.div-or::after{content:'';flex:1;height:.5px;background:var(--border)}
.div-or span{font-size:11px;color:var(--text3)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-hd{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-x{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px}

/* CYCLE */
.cycle-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:12px}
.cycle-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.cm{background:var(--bg4);border-radius:var(--r-sm);padding:10px 12px;text-align:center}
.cm-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;display:block;margin-bottom:2px}
.cm-lbl{font-size:10px;color:var(--text3)}

/* CHART */
.chart-wrap{position:relative;width:100%}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-box{width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:28px}
.login-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:28px 24px}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

.err-msg{background:rgba(224,82,82,.08);border:0.5px solid rgba(224,82,82,.25);border-radius:var(--r-sm);padding:9px 14px;font-size:12px;color:var(--danger);margin-bottom:14px}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty i{font-size:44px;margin-bottom:12px;display:block;opacity:.3}
.mono{font-family:'DM Mono',monospace}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0;padding-bottom:64px}
  .content{padding:16px}
  .topbar,.net-bar{padding-left:16px;padding-right:16px}
  .bnav{display:block}
  .stats-grid{grid-template-columns:1fr 1fr}
  .dash-charts{grid-template-columns:1fr !important}
  .dash-bottom{grid-template-columns:1fr !important}
  .modal{border-radius:var(--r-lg) var(--r-lg) 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%;max-height:92vh}
  .modal-ov{align-items:flex-end;padding:0}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .stat-val{font-size:20px}
  .cycle-metrics{grid-template-columns:repeat(2,1fr)}
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-family:'DM Mono',monospace;color:var(--accent2);font-size:22px">WatchBiz</div>
    <div style="font-size:12px;color:var(--text3)">Connexion à Firebase...</div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,enableIndexedDbPersistence,collection,doc,addDoc,setDoc,deleteDoc,onSnapshot,query,serverTimestamp,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyDovbZvljD_TuUMUbroUJpK5bZgUqTGHkY",authDomain:"probiz-4504e.firebaseapp.com",projectId:"probiz-4504e",storageBucket:"probiz-4504e.firebasestorage.app",messagingSenderId:"235127754642",appId:"1:235127754642:web:440341d948352904157b4b"};
const fb=initializeApp(cfg);
const auth=getAuth(fb);
const db=getFirestore(fb);
const gprov=new GoogleAuthProvider();
enableIndexedDbPersistence(db).catch(()=>{});

// ── network ──
let online=navigator.onLine,justOn=false;
window.addEventListener('online',()=>{online=true;justOn=true;render();setTimeout(()=>{justOn=false;render()},3500)});
window.addEventListener('offline',()=>{online=false;justOn=false;render()});

// ── utils ──
const fmtF=n=>new Intl.NumberFormat('fr-FR').format(Math.round(n||0))+' FCFA';
const fmtS=n=>{const a=Math.abs(n||0);if(a>=1e6)return(n/1e6).toFixed(1)+'M';if(a>=1e3)return Math.round(n/1e3)+'k';return Math.round(n||0)+''};
const today=()=>new Date().toISOString().slice(0,10);
const getWk=d=>{const dd=new Date(d),s=new Date(dd.getFullYear(),0,1);return Math.ceil(((dd-s)/864e5+s.getDay()+1)/7)};
const getMo=d=>d.slice(0,7);
const getYr=d=>d.slice(0,4);
const filt=(arr,dk,p)=>{
  const n=today(),cW=getWk(n),cM=getMo(n),cY=getYr(n);
  return arr.filter(x=>{
    if(!x[dk])return p==='tout';
    if(p==='semaine')return getWk(x[dk])===cW&&getYr(x[dk])===cY;
    if(p==='mois')return getMo(x[dk])===cM;
    if(p==='annee')return getYr(x[dk])===cY;
    return true;
  });
};

// ── state ──
let CU=null,stock=[],ventes=[],depenses=[],cycles=[],unsubs=[];
let charts_={};
// App state — kept outside React so input values survive re-renders
let S={tab:'dashboard',modal:null,md:{},period:'mois',vp:'mois',dp:'mois',ss:'',loading:true,aload:false,aerr:'',lmode:'login'};
// Stable input refs — store live values here so render() doesn't reset them
let inputVals={};
const setState=p=>{Object.assign(S,p);render()};

// ── firestore ──
const col=n=>collection(db,'users',CU.uid,n);
const dref=(n,id)=>doc(db,'users',CU.uid,n,id);
const addItem=(c,d)=>addDoc(col(c),{...d,_ts:serverTimestamp()});
const updItem=(c,id,d)=>setDoc(dref(c,id),d,{merge:true});
const delItem=(c,id)=>deleteDoc(dref(c,id));
const listenCol=(n,s)=>onSnapshot(query(col(n)),snap=>{s(snap.docs.map(d=>({id:d.id,...d.data()})));render()},()=>{});
const startL=()=>{unsubs.forEach(u=>u());unsubs=[];unsubs=[listenCol('stock',d=>stock=d),listenCol('ventes',d=>ventes=d),listenCol('depenses',d=>depenses=d),listenCol('cycles',d=>cycles=d)]};
const stopL=()=>{unsubs.forEach(u=>u());unsubs=[]};

onAuthStateChanged(auth,u=>{
  if(u){CU=u;startL();setState({loading:false})}
  else{stopL();CU=null;stock=[];ventes=[];depenses=[];cycles=[];setState({loading:false,tab:'dashboard'})}
});

const loginEmail=async(e,p)=>{
  setState({aload:true,aerr:''});
  try{S.lmode==='register'?await createUserWithEmailAndPassword(auth,e,p):await signInWithEmailAndPassword(auth,e,p)}
  catch(err){const m={'auth/user-not-found':'Email ou mot de passe incorrect','auth/wrong-password':'Email ou mot de passe incorrect','auth/invalid-credential':'Email ou mot de passe incorrect','auth/email-already-in-use':'Email déjà utilisé','auth/weak-password':'Mot de passe trop court','auth/invalid-email':'Email invalide'};setState({aerr:m[err.code]||err.message,aload:false})}
};
const loginGoogle=async()=>{
  setState({aload:true,aerr:''});
  try{await signInWithPopup(auth,gprov)}
  catch(err){setState({aerr:'Connexion Google échouée : '+(err.message||''),aload:false})}
};

// ── constants ──
const CATS=[{id:'meta',l:'Meta Ads',ic:'ti-brand-meta',c:'var(--info)'},{id:'transport',l:'Transport',ic:'ti-truck',c:'var(--accent)'},{id:'stock_achat',l:'Achat stock',ic:'ti-package',c:'var(--success)'},{id:'autres',l:'Autres',ic:'ti-dots',c:'var(--text3)'}];
const TABS=[{id:'dashboard',l:'Tableau de bord',ic:'ti-layout-dashboard'},{id:'stock',l:'Stock',ic:'ti-box'},{id:'ventes',l:'Ventes',ic:'ti-shopping-cart'},{id:'depenses',l:'Dépenses',ic:'ti-receipt'},{id:'cycles',l:'Cycles',ic:'ti-refresh'}];
const PAGES={dashboard:'Tableau de bord',stock:'Gestion du stock',ventes:'Ventes',depenses:'Dépenses',cycles:'Cycles de vente'};

const openM=(n,d={})=>setState({modal:n,md:{...d}});
const closeM=()=>setState({modal:null,md:{}});

// ── DOM helpers ──
function el(tag,props,...ch){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==='cls')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null&&c!==false)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
}

// ── CRITICAL FIX: persistent input — don't re-render on keystroke ──
// Instead of recreating inputs, we create them once and update state imperatively
function stableInput(key,type,ph,initVal,onChange,extraProps={}){
  const inp=el('input',{type,placeholder:ph,...extraProps});
  inp.value=initVal??'';
  inp.addEventListener('input',e=>{inputVals[key]=e.target.value;if(onChange)onChange(e.target.value)});
  // search: also update S.ss without full re-render
  return inp;
}

// ── destroy charts ──
const destroyCharts=()=>{Object.values(charts_).forEach(c=>{try{c.destroy()}catch{}});charts_={}};

// ── chart builders ──
const MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const last6=()=>{const c=new Date();return Array.from({length:6},(_,i)=>{const d=new Date(c.getFullYear(),c.getMonth()-5+i,1);return{m:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,l:MONTHS[d.getMonth()]}})};

const chartOpts=(yFmt)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>yFmt(c.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#65635e',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#65635e',font:{size:11},callback:v=>fmtS(v)+'F'}}}});

function mkProfitChart(){
  const cvs=document.getElementById('cProfit');if(!cvs)return;
  try{charts_.profit&&charts_.profit.destroy()}catch{}
  const mo=last6();
  const vals=mo.map(({m})=>Math.round(ventes.filter(v=>getMo(v.date)===m).reduce((s,v)=>s+v.profit,0)));
  charts_.profit=new Chart(cvs,{type:'bar',data:{labels:mo.map(x=>x.l),datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'rgba(61,186,116,.75)':'rgba(224,82,82,.75)'),borderRadius:5,borderSkipped:false}]},options:chartOpts(fmtF)});
}
function mkCaChart(){
  const cvs=document.getElementById('cCA');if(!cvs)return;
  try{charts_.ca&&charts_.ca.destroy()}catch{}
  const mo=last6();
  charts_.ca=new Chart(cvs,{type:'line',data:{labels:mo.map(x=>x.l),datasets:[
    {label:'CA',data:mo.map(({m})=>Math.round(ventes.filter(v=>getMo(v.date)===m).reduce((s,v)=>s+v.total,0))),borderColor:'#e8c97a',backgroundColor:'rgba(232,201,122,.08)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#e8c97a',borderWidth:2},
    {label:'Dépenses',data:mo.map(({m})=>Math.round(depenses.filter(d=>getMo(d.date)===m).reduce((s,d)=>s+d.montant,0))),borderColor:'#e05252',backgroundColor:'rgba(224,82,82,.06)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#e05252',borderWidth:2,borderDash:[5,3]}
  ]},options:chartOpts(fmtF)});
}
function mkDepDonut(fd){
  const cvs=document.getElementById('cDep');if(!cvs)return;
  try{charts_.dep&&charts_.dep.destroy()}catch{}
  const data=CATS.map(c=>Math.round(fd.filter(d=>d.categorie===c.id).reduce((s,d)=>s+d.montant,0)));
  if(!data.some(v=>v>0))return;
  charts_.dep=new Chart(cvs,{type:'doughnut',data:{labels:CATS.map(c=>c.l),datasets:[{data,backgroundColor:['#5b8dee','#c9a84c','#3dba74','#65635e'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+' : '+fmtF(c.raw)}}}}});
}
function mkVenteChart(){
  const cvs=document.getElementById('cVentes');if(!cvs)return;
  try{charts_.ventes&&charts_.ventes.destroy()}catch{}
  const mo=last6();
  charts_.ventes=new Chart(cvs,{type:'bar',data:{labels:mo.map(x=>x.l),datasets:[
    {label:'CA',data:mo.map(({m})=>Math.round(ventes.filter(v=>getMo(v.date)===m).reduce((s,v)=>s+v.total,0))),backgroundColor:'rgba(232,201,122,.7)',borderRadius:4,borderSkipped:false},
    {label:'Profit',data:mo.map(({m})=>Math.round(ventes.filter(v=>getMo(v.date)===m).reduce((s,v)=>s+v.profit,0))),backgroundColor:'rgba(61,186,116,.7)',borderRadius:4,borderSkipped:false}
  ]},options:{...chartOpts(fmtF),plugins:{...chartOpts(fmtF).plugins}}});
}

// ── stat card ──

// ── STOCK ──
function renderStock(){
  const ss=S.ss||'';
  const filtered=stock.filter(p=>p.nom&&p.nom.toLowerCase().includes(ss.toLowerCase()));
  const faible=stock.filter(p=>p.qte<=(p.qteMin||2));

  // Search input — built imperatively to avoid focus loss
  const searchInp=el('input',{type:'text',placeholder:'Rechercher un modèle...',style:{marginBottom:'16px'}});
  searchInp.value=ss;
  searchInp.addEventListener('input',e=>{
    S.ss=e.target.value;
    // Partial re-render: only update the list, not the whole page
    const listEl=document.getElementById('stock-list');
    if(listEl)listEl.replaceWith(buildStockList(stock.filter(p=>p.nom&&p.nom.toLowerCase().includes(S.ss.toLowerCase()))));
  });

  return el('div',null,
    el('div',{cls:'sec-hdr'},el('div',{cls:'sec-title'},'Inventaire'),el('button',{cls:'btn btn-primary btn-sm',onclick:()=>openM('stock_add')},el('i',{cls:'ti ti-plus'}),'Ajouter')),
    faible.length?el('div',{cls:'alert'},el('i',{cls:'ti ti-alert-triangle'}),` Stock faible : ${faible.map(p=>p.nom).slice(0,3).join(', ')}${faible.length>3?' +'+( faible.length-3):''}`):'',
    searchInp,
    buildStockList(filtered)
  );
}

function buildStockList(list){
  const wrap=el('div',{id:'stock-list'});
  if(list.length===0){
    wrap.appendChild(el('div',{cls:'empty'},el('i',{cls:'ti ti-watch'}),el('p',null,'Aucun produit en stock')));
    return wrap;
  }
  list.forEach(p=>{
    const marge=p.prixVente-p.prixAchat;
    const pct=Math.round(marge/(p.prixAchat||1)*100);
    const low=p.qte<=(p.qteMin||2);
    wrap.appendChild(el('div',{cls:'list-item'},
      el('div',{cls:'item-main'},
        el('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
          el('span',{cls:'item-name'},p.nom),
          el('span',{cls:'badge '+(pct>=0?'badge-warn':'badge-ko'),style:{marginLeft:'auto'}},'+'+pct+'% marge')
        ),
        el('div',{cls:'item-sub'},'Achat : '+fmtS(p.prixAchat)+' F  ·  Vente : '+fmtS(p.prixVente)+' F  ·  Marge : '+fmtS(marge)+' F')
      ),
      el('div',{cls:'item-right',style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}},
        el('span',{cls:'badge '+(low?'badge-ko':'badge-ok')},p.qte+' unité'+(p.qte!==1?'s':'')),
        el('div',{style:{display:'flex',gap:4}},
          el('button',{cls:'btn btn-ghost btn-icon btn-sm',onclick:()=>openM('stock_edit',{...p})},el('i',{cls:'ti ti-edit'})),
          el('button',{cls:'btn btn-danger-soft btn-icon btn-sm',onclick:()=>delItem('stock',p.id)},el('i',{cls:'ti ti-trash'}))
        )
      )
    ));
  });
  return wrap;
}

      el('div',{style:{display:'flex',gap:10,alignItems:'flex-start'}},
        el('i',{cls:'ti ti-info-circle',style:{fontSize:18,color:'var(--accent)',flexShrink:0,marginTop:1}}),
        el('div',{style:{fontSize:12,color:'var(--text3)',lineHeight:1.7}},'Un cycle = achat stock → pub Meta Ads → ventes → résultat. Associez vos ventes et dépenses à un cycle pour analyser chaque campagne.')
      )
    ),
    cycles.length===0?el('div',{cls:'empty'},el('i',{cls:'ti ti-refresh'}),el('p',null,'Créez votre premier cycle')):
    el('div',null,...cycles.map(c=>{
      const cV=ventes.filter(v=>v.cycleId===c.id);
      const cD=depenses.filter(d=>d.cycleId===c.id);
      const ca=cV.reduce((s,v)=>s+v.total,0);
      const benef=cV.reduce((s,v)=>s+v.profit,0);
      const dep=cD.reduce((s,d)=>s+d.montant,0);
      const profit=benef-dep;
      const roi=dep>0?Math.round(profit/dep*100):0;
      return el('div',{cls:'cycle-card'},
        el('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}},
          el('div',null,
            el('div',{style:{fontWeight:600,fontSize:15,marginBottom:3}},c.nom),
            el('div',{style:{fontSize:11,color:'var(--text3)'}},c.dateDebut+(c.dateFin?' → '+c.dateFin:' · En cours'))
          ),
          el('div',{style:{display:'flex',gap:6,alignItems:'center'}},
            el('span',{cls:'badge '+(c.statut==='actif'?'badge-ok':'badge-info'),style:{cursor:'pointer'},onclick:()=>updItem('cycles',c.id,{statut:c.statut==='actif'?'termine':'actif'})},c.statut==='actif'?'Actif':'Terminé'),
            el('button',{cls:'btn btn-danger-soft btn-icon btn-sm',onclick:()=>delItem('cycles',c.id)},el('i',{cls:'ti ti-trash'}))
          )
        ),
        el('div',{cls:'cycle-metrics'},
          el('div',{cls:'cm'},el('span',{cls:'cm-val mono',style:{color:'var(--accent2)'}},fmtS(ca)+' F'),el('span',{cls:'cm-lbl'},"CA")),
          el('div',{cls:'cm'},el('span',{cls:'cm-val mono',style:{color:'var(--danger)'}},fmtS(dep)+' F'),el('span',{cls:'cm-lbl'},'Dépenses')),
          el('div',{cls:'cm'},el('span',{cls:'cm-val mono',style:{color:profit>=0?'var(--success)':'var(--danger)'}},fmtS(profit)+' F'),el('span',{cls:'cm-lbl'},'Profit')),
          el('div',{cls:'cm'},el('span',{cls:'cm-val mono',style:{color:'var(--info)'}},cV.length+''),el('span',{cls:'cm-lbl'},'Ventes')),
          el('div',{cls:'cm'},el('span',{cls:'cm-val mono',style:{color:'var(--accent)'}},roi+'%'),el('span',{cls:'cm-lbl'},'ROI')),
          el('div',{cls:'cm'},el('span',{cls:'cm-val mono',style:{color:'var(--text2)'}},ca>0?Math.round(benef/ca*100)+'%':'—'),el('span',{cls:'cm-lbl'},'Taux marge'))
        ),
        profit!==0&&el('div',{style:{marginTop:12}},
          el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5,color:'var(--text3)'}},
            el('span',null,'Performance'),
            el('span',{style:{color:profit>=0?'var(--success)':'var(--danger)',fontWeight:500}},(profit>=0?'+':'')+fmtS(profit)+' FCFA')
          ),
          el('div',{cls:'pbar',style:{height:5}},el('div',{cls:'pfill',style:{width:Math.min(100,Math.abs(roi))+'%',background:profit>=0?'var(--success)':'var(--danger)'}}))
        )
      );
    }))
  );
}

// ── MODALS ──
function renderModal(){
  const m=S.modal,d=S.md||{};
  if(!m)return null;
  let inner=null;
  const titles={stock_add:'Nouveau produit',stock_edit:'Modifier produit',vente_add:'Nouvelle vente',dep_add:'Ajouter une dépense',cycle_add:'Nouveau cycle'};

  if(m==='stock_add'||m==='stock_edit'){
    let nom=d.nom||'',pa=+(d.prixAchat||0),pv=+(d.prixVente||0),qte=+(d.qte||0),qmin=+(d.qteMin||2);
    const margeEl=el('div',{cls:'preview-box'});
    const upd=()=>{if(pa&&pv){margeEl.style.display='block';const mg=pv-pa;margeEl.innerHTML=`Marge : <strong class="mono" style="color:${mg>=0?'var(--success)':'var(--danger)'}">${fmtS(mg)} FCFA (${Math.round(mg/pa*100)}%)</strong>`}else margeEl.style.display='none'};
    const nomI=el('input',{type:'text',placeholder:'Ex: Casio G-Shock DW5600',value:nom});nomI.oninput=e=>nom=e.target.value;
    const paI=el('input',{type:'number',placeholder:'0',value:pa||''});paI.oninput=e=>{pa=+e.target.value;upd()};
    const pvI=el('input',{type:'number',placeholder:'0',value:pv||''});pvI.oninput=e=>{pv=+e.target.value;upd()};
    const qteI=el('input',{type:'number',placeholder:'0',value:qte||''});qteI.oninput=e=>qte=+e.target.value;
    const qminI=el('input',{type:'number',placeholder:'2',value:qmin});qminI.oninput=e=>qmin=+e.target.value;
    inner=el('div',null,
      fg('Nom du modèle',nomI),
      el('div',{cls:'form-row'},fg("Prix d'achat (FCFA)",paI),fg('Prix de vente (FCFA)',pvI)),
      el('div',{cls:'form-row'},fg('Quantité disponible',qteI),fg('Alerte stock min',qminI)),
      margeEl,
      el('button',{cls:'btn btn-primary btn-full',onclick:async()=>{
        if(!nom||!pa||!pv)return;
        const data={nom,prixAchat:+pa,prixVente:+pv,qte:+qte,qteMin:+qmin};
        m==='stock_edit'?await updItem('stock',d.id,data):await addItem('stock',data);
        closeM();
      }},el('i',{cls:'ti ti-check'}),'Enregistrer')
    );
  }

  if(m==='vente_add'){
    let prodId='',qte=1,pv='',date=today(),cycleId='';
    const prev=el('div',{cls:'preview-box'});
    const upd=()=>{const sp=stock.find(x=>x.id===prodId);if(sp&&pv&&qte){prev.style.display='block';const pr=(pv-sp.prixAchat)*qte;prev.innerHTML=`Total : <strong class="mono" style="color:var(--accent2)">${fmtS(pv*qte)} FCFA</strong> &nbsp;·&nbsp; Profit : <strong class="mono" style="color:${pr>=0?'var(--success)':'var(--danger)'}">${fmtS(pr)} FCFA</strong>`}else prev.style.display='none'};
    const pvI=el('input',{type:'number',placeholder:'0'});pvI.oninput=e=>{pv=+e.target.value;upd()};
    const qteI=el('input',{type:'number',min:'1',value:'1'});qteI.oninput=e=>{qte=+e.target.value;upd()};
    const dateI=el('input',{type:'date',value:date});dateI.onchange=e=>date=e.target.value;
    const prodS=el('select',{},el('option',{value:''},'Choisir un produit...'),...stock.filter(p=>p.qte>0).map(p=>el('option',{value:p.id},p.nom+' ('+p.qte+' en stock)')));
    prodS.onchange=e=>{prodId=e.target.value;const sp=stock.find(x=>x.id===prodId);if(sp){pvI.value=pv=sp.prixVente;}upd()};
    const cycleS=cycles.length?el('select',{},el('option',{value:''},'Aucun'),...cycles.map(c=>el('option',{value:c.id},c.nom))):null;
    if(cycleS)cycleS.onchange=e=>cycleId=e.target.value;
    inner=el('div',null,
      fg('Produit',prodS),
      el('div',{cls:'form-row'},fg('Quantité',qteI),fg('Prix de vente (FCFA)',pvI)),
      el('div',{cls:'form-row'},fg('Date',dateI),cycleS?fg('Cycle',cycleS):el('span')),
      prev,
      el('button',{cls:'btn btn-primary btn-full',onclick:async()=>{
        if(!prodId||!qte||!pv)return;
        const sp=stock.find(x=>x.id===prodId);
        if(!sp||sp.qte<qte){alert('Stock insuffisant');return;}
        const cy=cycles.find(x=>x.id===cycleId);
        const batch=writeBatch(db);
        const vRef=doc(collection(db,'users',CU.uid,'ventes'));
        batch.set(vRef,{produitId:sp.id,produitNom:sp.nom,qte:+qte,prixVente:+pv,prixAchat:sp.prixAchat,profit:(+pv-sp.prixAchat)*+qte,total:+pv*+qte,date,cycleId,cycleName:cy?cy.nom:'',_ts:serverTimestamp()});
        batch.set(dref('stock',sp.id),{qte:sp.qte-+qte},{merge:true});
        await batch.commit();
        closeM();
      }},el('i',{cls:'ti ti-check'}),'Confirmer la vente')
    );
  }

  if(m==='dep_add'){
    let cat='meta',montant='',note='',date=today(),cycleId='';
    const catGrid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}});
    const drawCats=()=>{catGrid.innerHTML='';CATS.forEach(c=>{catGrid.appendChild(el('button',{style:{padding:'10px',borderRadius:'var(--r-sm)',background:cat===c.id?'var(--accent)':'var(--bg3)',border:'0.5px solid '+(cat===c.id?'var(--accent)':'var(--border2)'),color:cat===c.id?'#0a0a0f':'var(--text2)',fontSize:'12px',display:'flex',alignItems:'center',gap:'7px',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:500},onclick:()=>{cat=c.id;drawCats()}},el('i',{cls:'ti '+c.ic,style:{fontSize:15}}),c.l))})}; drawCats();
    const mI=el('input',{type:'number',placeholder:'0'});mI.oninput=e=>montant=e.target.value;
    const dateI=el('input',{type:'date',value:date});dateI.onchange=e=>date=e.target.value;
    const nI=el('input',{type:'text',placeholder:'Description...'});nI.oninput=e=>note=e.target.value;
    const cycleS=cycles.length?el('select',{},el('option',{value:''},'Aucun'),...cycles.map(c=>el('option',{value:c.id},c.nom))):null;
    if(cycleS)cycleS.onchange=e=>cycleId=e.target.value;
    inner=el('div',null,
      fg('Catégorie',catGrid),
      el('div',{cls:'form-row'},fg('Montant (FCFA)',mI),fg('Date',dateI)),
      fg('Note (optionnel)',nI),
      cycleS?fg('Cycle',cycleS):'',
      el('button',{cls:'btn btn-primary btn-full',onclick:async()=>{
        if(!montant)return;
        const cy=cycles.find(x=>x.id===cycleId);
        await addItem('depenses',{categorie:cat,montant:+montant,note,date,cycleId,cycleName:cy?cy.nom:''});
        closeM();
      }},el('i',{cls:'ti ti-check'}),'Enregistrer')
    );
  }

  if(m==='cycle_add'){
    let nom='',debut=today(),fin='';
    const nomI=el('input',{type:'text',placeholder:'Ex: Campagne Noël 2025'});nomI.oninput=e=>nom=e.target.value;
    const dI=el('input',{type:'date',value:debut});dI.onchange=e=>debut=e.target.value;
    const fI=el('input',{type:'date'});fI.onchange=e=>fin=e.target.value;
    inner=el('div',null,
      fg('Nom du cycle',nomI),
      el('div',{cls:'form-row'},fg('Date début',dI),fg('Date fin (optionnel)',fI)),
      el('button',{cls:'btn btn-primary btn-full',onclick:async()=>{
        if(!nom)return;
        await addItem('cycles',{nom,dateDebut:debut,dateFin:fin,statut:'actif'});
        closeM();
      }},el('i',{cls:'ti ti-check'}),'Créer le cycle')
    );
  }

  if(!inner)return null;
  return el('div',{cls:'modal-ov',onclick:e=>{if(e.target.className==='modal-ov')closeM()}},
    el('div',{cls:'modal'},
      el('div',{cls:'modal-hd'},titles[m]||'',el('button',{cls:'modal-x',onclick:closeM},el('i',{cls:'ti ti-x'}))),
      inner
    )
  );
}

// ── MAIN RENDER ──
function render(){
  destroyCharts();
  const root=document.getElementById('root');
  root.innerHTML='';

  if(S.loading){
    root.appendChild(el('div',{cls:'loading-screen'},el('div',{cls:'spinner'}),el('div',{style:{fontFamily:"'DM Mono',monospace",color:'var(--accent2)',fontSize:22}},'WatchBiz'),el('div',{style:{fontSize:12,color:'var(--text3)'}},'Connexion Firebase...')));
    return;
  }
  if(!CU){root.appendChild(renderLogin());return;}

  const t=S.tab;
  const ini=(CU.displayName||CU.email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  const sidebar=el('div',{cls:'sidebar'},
    el('div',{cls:'sb-logo'},
      el('div',{cls:'sb-logo-icon'},'⌚'),
      el('div',null,el('div',{cls:'sb-logo-text'},'WatchBiz'),el('div',{cls:'sb-logo-sub'},'Gestion montres'))
    ),
    el('div',{cls:'sb-nav'},...TABS.map(tb=>
      el('button',{cls:'sb-item'+(t===tb.id?' active':''),onclick:()=>setState({tab:tb.id})},el('i',{cls:'ti '+tb.ic}),tb.l)
    )),
    el('div',{cls:'sb-footer'},
      el('div',{cls:'user-row'},
        el('div',{cls:'user-init'},ini),
        el('div',{cls:'user-info'},el('div',{cls:'user-name'},CU.displayName||CU.email),el('div',{cls:'user-status'},online?'En ligne · Firebase':'Hors ligne')),
        el('button',{cls:'logout-btn',onclick:()=>signOut(auth),title:'Déconnexion'},el('i',{cls:'ti ti-logout',style:{fontSize:15}}))
      )
    )
  );

  const netBar=justOn?el('div',{cls:'net-bar online'},el('i',{cls:'ti ti-cloud-check'}),'Connexion rétablie — données synchronisées'):
    !online?el('div',{cls:'net-bar offline'},el('i',{cls:'ti ti-wifi-off'}),'Mode hors ligne — synchronisation à la reconnexion'):null;

  let pageEl;
  if(t==='dashboard')pageEl=renderDashboard();
  else if(t==='stock')pageEl=renderStock();
  else if(t==='ventes')pageEl=renderVentes();
  else if(t==='depenses')pageEl=renderDepenses();
  else pageEl=renderCycles();

  const main=el('div',{cls:'main'},
    el('div',{cls:'topbar'},
      el('div',{cls:'page-title'},PAGES[t]||''),
      el('div',{cls:'sync-chip '+(online?'sync-on':'sync-off')},el('i',{cls:'ti '+(online?'ti-cloud-check':'ti-wifi-off'),style:{fontSize:14}}),online?'Sync':'Hors ligne')
    ),
    netBar||'',
    el('div',{cls:'content'},pageEl)
  );

  const bnav=el('div',{cls:'bnav'},el('div',{cls:'bnav-row'},...TABS.map(tb=>
    el('button',{cls:'bnav-btn'+(t===tb.id?' active':''),onclick:()=>setState({tab:tb.id})},
      el('i',{cls:'ti '+tb.ic}),tb.l
    )
  )));

  const shell=el('div',{cls:'shell'},sidebar,main,bnav);
  const modal=renderModal();
  if(modal)shell.appendChild(modal);
  root.appendChild(shell);
}

render();
</script>
</body>
</html>
