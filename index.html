<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WatchBiz ⌚</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23111118'/><text y='74' x='50' text-anchor='middle' font-size='58'>⌚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
  input[type="text"], 
  input[type="password"], 
  input[type="email"], 
  input[type="number"], 
  textarea, 
  select {
    font-size: 16px !important;
  }
:root{
  --bg:#09090e;--bg2:#101018;--bg3:#16161f;--bg4:#1e1e28;
  --gold:#c9a84c;--gold2:#e8c97a;
  --text:#ede9e0;--t2:#989690;--t3:#5e5c57;
  --ok:#3db870;--err:#e04f4f;--info:#5b8dee;--warn:#e8a84c;
  --bdr:rgba(201,168,76,0.10);--bdr2:rgba(201,168,76,0.22);
  --r:8px;--rl:12px;--rx:16px;--sw:228px;--ease:.16s ease;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;overflow-x:hidden}
input,select{font-family:'Sora',sans-serif;font-size:13px;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--text);border-radius:var(--r);padding:9px 12px;width:100%;outline:none;transition:border var(--ease),box-shadow var(--ease)}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.10)}
input::placeholder{color:var(--t3)}
select option{background:var(--bg3)}
button{font-family:'Sora',sans-serif;cursor:pointer;border:none;outline:none;transition:all var(--ease)}

/* ── SHELL ── */
.shell{display:flex;min-height:100vh}
.sb{width:var(--sw);background:var(--bg2);border-right:0.5px solid var(--bdr);position:fixed;top:0;bottom:0;left:0;z-index:50;display:flex;flex-direction:column}
.sb-top{padding:22px 16px 18px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;background:rgba(201,168,76,.14);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-brand{font-family:'DM Mono',monospace;font-size:16px;color:var(--gold2);line-height:1.15}
.sb-brand small{font-size:10px;color:var(--t3);font-family:'Sora',sans-serif;font-weight:400;display:block}
.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.si{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);color:var(--t3);font-size:12.5px;font-weight:500;cursor:pointer;background:none;border:none;width:100%;text-align:left}
.si i{font-size:17px;flex-shrink:0;line-height:1}
.si:hover{background:var(--bg3);color:var(--t2)}
.si.on{background:rgba(201,168,76,.10);color:var(--gold2)}
.si.on i{color:var(--gold2)}
.sb-foot{padding:10px 10px 14px;border-top:0.5px solid var(--bdr)}
.urow{display:flex;align-items:center;gap:9px;padding:8px 10px}
.uavt{width:30px;height:30px;border-radius:50%;background:rgba(201,168,76,.16);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold2);flex-shrink:0}
.unfo{flex:1;min-width:0}
.uname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ustatus{font-size:10px;color:var(--t3);margin-top:1px}
.logout{background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--t3);width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.logout:hover{color:var(--err)}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--bdr);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.ptitle{font-size:15px;font-weight:600}
.schip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.schip.on{color:var(--ok);background:rgba(61,184,112,.10)}
.schip.off{color:var(--warn);background:rgba(232,168,76,.10)}
.schip i{font-size:13px}
.nbar{padding:7px 28px;display:flex;align-items:center;gap:8px;font-size:12px;border-bottom:0.5px solid}
.nbar.offline{background:rgba(232,168,76,.07);border-color:rgba(232,168,76,.18);color:var(--warn)}
.nbar.online2{background:rgba(61,184,112,.07);border-color:rgba(61,184,112,.18);color:var(--ok)}
.nbar i{font-size:14px}
.content{flex:1;padding:28px}
.bnav{display:none;background:var(--bg2);border-top:0.5px solid var(--bdr);position:fixed;bottom:0;left:0;right:0;z-index:50}
.bnav-row{display:flex}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;background:none;border:none;color:var(--t3);font-size:10px;cursor:pointer;font-family:'Sora',sans-serif;line-height:1}
.bi i{font-size:21px;display:block;line-height:1}
.bi.on{color:var(--gold2)}

/* ── CARDS ── */
.card{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:20px 22px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-t{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1.1px;font-weight:500}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-lbl{font-size:11px;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.sc-lbl i{font-size:14px}
.sc-val{font-family:'DM Mono',monospace;font-weight:500;line-height:1.1;margin-bottom:4px;font-size:clamp(13px,1.8vw,20px);word-break:break-all}
.sc-sub{font-size:11px;color:var(--t3)}
.sg .sc::before{background:var(--gold)}.sg .sc-val{color:var(--gold2)}
.sv .sc::before{background:var(--ok)}.sv .sc-val{color:var(--ok)}
.sr .sc::before{background:var(--err)}.sr .sc-val{color:var(--err)}
.sb2 .sc::before{background:var(--info)}.sb2 .sc-val{color:var(--info)}

/* ── BUTTONS ── */
.btn{padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn i{font-size:15px}
.btn-p{background:var(--gold);color:#09090e}.btn-p:hover{background:var(--gold2)}
.btn-g{background:transparent;color:var(--t2);border:0.5px solid var(--bdr2)}.btn-g:hover{border-color:var(--gold2);color:var(--gold2)}
.btn-d{background:rgba(224,79,79,.10);color:var(--err);border:0.5px solid rgba(224,79,79,.22)}.btn-d:hover{background:rgba(224,79,79,.18)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-ico{width:32px;height:32px;padding:0;justify-content:center}

/* ── BADGES ── */
.bdk{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bdk-ok{background:rgba(61,184,112,.10);color:var(--ok);border:0.5px solid rgba(61,184,112,.22)}
.bdk-ko{background:rgba(224,79,79,.10);color:var(--err);border:0.5px solid rgba(224,79,79,.22)}
.bdk-w{background:rgba(232,168,76,.10);color:var(--warn);border:0.5px solid rgba(232,168,76,.22)}
.bdk-i{background:rgba(91,141,238,.10);color:var(--info);border:0.5px solid rgba(91,141,238,.22)}

/* ══════════════════════════════════════════
   STOCK ITEM — nouveau layout aéré
══════════════════════════════════════════ */
.sitem{
  background:var(--bg3);
  border:0.5px solid var(--bdr);
  border-radius:var(--rl);
  padding:18px 20px;          /* plus de padding */
  margin-bottom:10px;
  transition:border-color var(--ease),box-shadow var(--ease);
}
.sitem:last-child{margin-bottom:0}
.sitem:hover{border-color:var(--bdr2);box-shadow:0 2px 12px rgba(0,0,0,.2)}

/* ligne 1 : nom + badge marge */
.sitem-row1{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;         /* espace sous le nom */
}
.sitem-name{
  font-weight:600;
  font-size:14px;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
}

/* ligne 2 : 3 pills de prix */
.sitem-row2{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;         /* espace sous les prix */
}
.price-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:var(--bg4);
  border:0.5px solid rgba(255,255,255,.06);
  border-radius:6px;
  padding:5px 10px;
  font-size:12px;
  font-family:'DM Mono',monospace;
  font-weight:500;
}
.price-pill i{font-size:13px}
.price-pill .pill-lbl{font-family:'Sora',sans-serif;font-size:10px;color:var(--t3);margin-right:2px;font-weight:400}

/* ligne 3 : stock + boutons */
.sitem-row3{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.stock-info{display:flex;align-items:center;gap:8px}
.stock-bar{height:4px;width:80px;background:var(--bg4);border-radius:2px;overflow:hidden}
.stock-fill{height:100%;border-radius:2px;transition:width .4s}
.stock-txt{font-size:11px;color:var(--t3)}
.sitem-actions{display:flex;gap:6px}

/* ── REGULAR LIST ITEMS (ventes/dépenses) ── */
.li{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.li:last-child{margin-bottom:0}
.li:hover{border-color:var(--bdr2)}
.li-ic{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.li-main{flex:1;min-width:0}
.li-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-sub{font-size:11px;color:var(--t3);margin-top:3px}
.li-right{text-align:right;flex-shrink:0}

/* ── MISC ── */
.pb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px;transition:width .4s ease}
.ptabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:18px;gap:2px}
.pt{flex:1;padding:7px 4px;background:none;color:var(--t3);font-size:11.5px;border-radius:6px;font-weight:500;font-family:'Sora',sans-serif;cursor:pointer;border:none}
.pt.on{background:var(--gold);color:#09090e}
.alert{background:rgba(224,79,79,.07);border:0.5px solid rgba(224,79,79,.20);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--err)}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.stitle{font-size:18px;font-weight:600}
.div-or{display:flex;align-items:center;gap:10px;margin:14px 0}
.div-or::before,.div-or::after{content:'';flex:1;height:.5px;background:var(--bdr)}
.div-or span{font-size:11px;color:var(--t3)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:var(--rx);padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mhd{font-size:15px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.mx{background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--t2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0}
.cyc{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:18px 20px;margin-bottom:12px}
.cm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.cm{background:var(--bg4);border-radius:var(--r);padding:10px 12px;text-align:center}
.cm-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;display:block;margin-bottom:2px;word-break:break-all}
.cm-lbl{font-size:10px;color:var(--t3)}
.cw{position:relative;width:100%}
.lscreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.lbox{width:100%;max-width:372px}
.lcard{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rx);padding:28px 26px}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:30px;height:30px;border:2px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
.emsg{background:rgba(224,79,79,.08);border:0.5px solid rgba(224,79,79,.22);border-radius:var(--r);padding:9px 14px;font-size:12px;color:var(--err);margin-bottom:14px}
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty i{font-size:42px;margin-bottom:12px;display:block;opacity:.25}
.mono{font-family:'DM Mono',monospace}
.prev-box{background:rgba(201,168,76,.05);border:0.5px solid var(--bdr2);border-radius:var(--r);padding:10px 14px;margin-bottom:13px;font-size:12px;display:none;line-height:1.7}
.fg{margin-bottom:13px}
.fg label{font-size:11px;color:var(--t3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px 16px;background:#fff;color:#1f1f1f;border:0.5px solid #dadce0;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:'Sora',sans-serif;margin-top:12px}
.gbtn:hover{background:#f5f5f5}
.gbtn img{width:18px;height:18px;flex-shrink:0}

@media(max-width:900px){
  .sb{display:none}.main{margin-left:0;padding-bottom:68px}.content{padding:16px}
  .topbar,.nbar{padding-left:16px;padding-right:16px}.topbar{height:50px}
  .bnav{display:block}.sgrid{grid-template-columns:1fr 1fr}
  .dash-2col,.dash-bot{grid-template-columns:1fr !important}
  .mov{align-items:flex-end;padding:0}.modal{border-radius:var(--rx) var(--rx) 0 0;max-width:100%;max-height:92vh}
  .frow{grid-template-columns:1fr}
  .sitem-row2{gap:6px}
  .price-pill{padding:4px 8px;font-size:11px}
  .stock-bar{width:56px}
}
@media(max-width:440px){.sgrid{grid-template-columns:1fr}.cm-grid{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
</style>
</head>
<body>
<div id="R">
  <div class="loading"><div class="spin"></div>
    <div style="font-family:'DM Mono',monospace;color:var(--gold2);font-size:21px">WatchBiz</div>
    <div style="font-size:12px;color:var(--t3)">Connexion à Firebase…</div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,enableIndexedDbPersistence,collection,doc,addDoc,setDoc,deleteDoc,onSnapshot,query,serverTimestamp,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyDovbZvljD_TuUMUbroUJpK5bZgUqTGHkY",authDomain:"probiz-4504e.firebaseapp.com",projectId:"probiz-4504e",storageBucket:"probiz-4504e.firebasestorage.app",messagingSenderId:"235127754642",appId:"1:235127754642:web:440341d948352904157b4b"};
const fb=initializeApp(FB);
const auth=getAuth(fb);
const db=getFirestore(fb);
const gp=new GoogleAuthProvider();
enableIndexedDbPersistence(db).catch(()=>{});

let online=navigator.onLine,justOn=false;
window.addEventListener('online',()=>{online=true;justOn=true;render();setTimeout(()=>{justOn=false;render()},3500)});
window.addEventListener('offline',()=>{online=false;justOn=false;render()});

const NF=new Intl.NumberFormat('fr-FR');
const fmtN=n=>NF.format(Math.round(n||0));
const fmtF=n=>fmtN(n)+' FCFA';
const fmtChart=n=>{const a=Math.abs(n||0);if(a>=1e6)return(n/1e6).toFixed(1)+'M';if(a>=1e3)return Math.round(n/1e3)+'k';return Math.round(n||0)+''};
const today=()=>new Date().toISOString().slice(0,10);
const getWk=d=>{const dd=new Date(d),s=new Date(dd.getFullYear(),0,1);return Math.ceil(((dd-s)/864e5+s.getDay()+1)/7)};
const getMo=d=>d.slice(0,7);
const getYr=d=>d.slice(0,4);
const filtArr=(arr,dk,p)=>{
  const n=today(),cW=getWk(n),cM=getMo(n),cY=getYr(n);
  return arr.filter(x=>{
    if(!x[dk])return p==='tout';
    if(p==='semaine')return getWk(x[dk])===cW&&getYr(x[dk])===cY;
    if(p==='mois')return getMo(x[dk])===cM;
    if(p==='annee')return getYr(x[dk])===cY;
    return true;
  });
};

let CU=null,stock=[],ventes=[],depenses=[],cycles=[],unsubs=[];
let CH={};
let S={tab:'dashboard',modal:null,md:{},per:'mois',vp:'mois',dp:'mois',ss:'',loading:true,al:false,ae:'',lm:'login'};
const set=p=>{Object.assign(S,p);render()};

const col=n=>collection(db,'users',CU.uid,n);
const dr=(n,id)=>doc(db,'users',CU.uid,n,id);
const addI=(c,d)=>addDoc(col(c),{...d,_ts:serverTimestamp()});
const updI=(c,id,d)=>setDoc(dr(c,id),d,{merge:true});
const delI=(c,id)=>deleteDoc(dr(c,id));
const lisCol=(n,s)=>onSnapshot(query(col(n)),snap=>{s(snap.docs.map(d=>({id:d.id,...d.data()})));render()},()=>{});
const startL=()=>{unsubs.forEach(u=>u());unsubs=[];unsubs=[lisCol('stock',d=>stock=d),lisCol('ventes',d=>ventes=d),lisCol('depenses',d=>depenses=d),lisCol('cycles',d=>cycles=d)]};
const stopL=()=>{unsubs.forEach(u=>u());unsubs=[]};

onAuthStateChanged(auth,u=>{if(u){CU=u;startL();set({loading:false})}else{stopL();CU=null;stock=[];ventes=[];depenses=[];cycles=[];set({loading:false,tab:'dashboard'})}});
const loginEmail=async(e,p)=>{set({al:true,ae:''});try{S.lm==='register'?await createUserWithEmailAndPassword(auth,e,p):await signInWithEmailAndPassword(auth,e,p)}catch(err){const m={'auth/user-not-found':'Email ou mot de passe incorrect','auth/wrong-password':'Email ou mot de passe incorrect','auth/invalid-credential':'Email ou mot de passe incorrect','auth/email-already-in-use':'Email déjà utilisé','auth/weak-password':'Mot de passe trop court','auth/invalid-email':'Email invalide'};set({ae:m[err.code]||err.message,al:false})}};
const loginGoogle=()=>signInWithPopup(auth,gp).catch(err=>set({ae:'Connexion Google échouée : ajoutez claude.ai dans les domaines autorisés Firebase.',al:false}));

const CATS=[{id:'meta',l:'Meta Ads',ic:'ti-brand-meta',c:'var(--info)'},{id:'transport',l:'Transport',ic:'ti-truck',c:'var(--gold)'},{id:'stock_achat',l:'Achat stock',ic:'ti-package',c:'var(--ok)'},{id:'autres',l:'Autres',ic:'ti-dots',c:'var(--t3)'}];

function el(tag,props,...ch){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==='cls')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null&&c!==false)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
}

function buildSList(list){
  const w=el('div',{id:'slist'});
  if(!list.length){w.appendChild(el('div',{cls:'empty'},el('i',{cls:'ti ti-watch'}),el('p',null,'Aucun produit en stock')));return w}
  list.forEach(p=>{
    const marge=p.prixVente-p.prixAchat;
    const pct=Math.round(marge/Math.max(p.prixAchat,1)*100);
    const low=p.qte<=(p.qteMin||2);
    const qteMax=Math.max(p.qte,p.qteMin||2,1);
    const stockPct=Math.min(100,Math.round(p.qte/qteMax*100));

    w.appendChild(el('div',{cls:'sitem'},

      /* ── ligne 1 : nom  +  badge marge ── */
      el('div',{cls:'sitem-row1'},
        el('span',{cls:'sitem-name'},p.nom),
        el('span',{cls:'bdk bdk-w'},(pct>=0?'+':'')+pct+'% marge')
      ),

      /* ── ligne 2 : 3 pills prix ── */
      el('div',{cls:'sitem-row2'},
        el('div',{cls:'price-pill'},
          el('i',{cls:'ti ti-arrow-down-circle',style:{color:'var(--info)'}}),
          el('span',{cls:'pill-lbl'},'Achat'),
          el('span',null,fmtN(p.prixAchat)+' F')

        el('div',{cls:'price-pill'},
          el('i',{cls:'ti ti-arrow-up-circle',style:{color:'var(--ok)'}}),
          el('span',{cls:'pill-lbl'},'Vente'),
          el('span',null,fmtN(p.prixVente)+' F')
        ),
        el('div',{cls:'price-pill',style:{color:marge>=0?'var(--ok)':'var(--err)'}},
          el('i',{cls:'ti ti-coin',style:{color:marge>=0?'var(--ok)':'var(--err)'}}),
          el('span',{cls:'pill-lbl'},'Marge'),
          el('span',null,(marge>=0?'+':'')+fmtN(marge)+' F')
        )
      ),

      /* ── ligne 3 : barre stock  +  boutons ── */
      el('div',{cls:'sitem-row3'},
        el('div',{cls:'stock-info'},
          el('span',{cls:'bdk '+(low?'bdk-ko':'bdk-ok')},p.qte+' unité'+(p.qte!==1?'s':'')),
          el('div',{cls:'stock-bar'},
            el('div',{cls:'stock-fill',style:{width:stockPct+'%',background:low?'var(--err)':'var(--ok)'}})

          low?el('span',{style:{fontSize:10,color:'var(--err)',marginLeft:2}},'Stock faible'):'',
        ),
        el('div',{cls:'sitem-actions'},
          el('button',{cls:'btn btn-g btn-ico btn-sm',title:'Modifier',onclick:()=>openM('stock_edit',{...p})},el('i',{cls:'ti ti-edit'})),
          el('button',{cls:'btn btn-d btn-ico btn-sm',title:'Supprimer',onclick:()=>delI('stock',p.id)},el('i',{cls:'ti ti-trash'}))
        )
      )
    ));
  });
  return w;
}
